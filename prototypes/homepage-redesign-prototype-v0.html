      function renderOpportunities() {
        // Sort by emissions
        const sortedByEmissions = [...opportunities].sort((a, b) => {
          const aValue = parseFloat(a.emissions);
          const bValue = parseFloat(b.emissions);
          return bValue - aValue;
        });
        
        // Sort by cost
        const sortedByCost = [...opportunities].sort((a, b) => {
          const aValue = parseFloat(a.cost.replace(/[$,]/g, ''));
          const bValue = parseFloat(b.cost.replace(/[$,]/g, ''));
          return bValue - aValue;
        });
        
        const topByEmissions = sortedByEmissions.slice(0, 3);
        const topByCost = sortedByCost.slice(0, 3);
        
        const emissionsContainer = document.getElementById('opportunities-emissions');
        const costContainer = document.getElementById('opportunities-cost');
        
        if (emissionsContainer) {

                    opp.savings === 'Medium' ? 'bg-blue-50' : 
                    'bg-orange-50'

                      opp.savings === 'High' ? 'text-green-600' : 
                      opp.savings === 'Medium' ? 'text-blue-600' : 
                      'text-orange-600'
                    }">
                      <p class="leading-[16px]">${opp.savings}</p>
                    </div>
                  </div>
                </div>
                <div class="flex items-center gap-[16px] relative shrink-0 w-full">
                  <div class="flex flex-col items-start relative shrink-0">
                    <div class="flex flex-col font-inter font-normal justify-center leading-[0] relative shrink-0 text-content-secondary-gray text-[11px] mb-[2px]">
                      <p class="leading-[16px]">Emissions</p>
                    </div>

          `).join('');

        if (costContainer) {

      function setProductView(view) {
        productView = view;
        const listView = document.getElementById('products-list-view');
        const kanbanView = document.getElementById('products-kanban-view');
        const viewButtons = document.querySelectorAll('[data-product-view]');

        viewButtons.forEach(btn => {
          const value = btn.getAttribute('data-product-view');
          if (value === view) {
            btn.classList.remove('bg-transparent', 'border-border-neutral-1', 'text-content-secondary-gray');
            btn.classList.add('bg-content-primary-brand', 'border-content-primary-brand', 'text-white');
          } else {
            btn.classList.remove('bg-content-primary-brand', 'border-content-primary-brand', 'text-white');
            btn.classList.add('bg-transparent', 'border-border-neutral-1', 'text-content-secondary-gray');
          }
        });

        if (listView && kanbanView) {
          if (view === 'list') {
            listView.style.display = 'block';
            kanbanView.style.display = 'none';
          } else {
            listView.style.display = 'none';
            kanbanView.style.display = 'block';
          }
        }
      }
      
      window.filterProducts = function(tab) {
        currentTab = tab;
        const rows = document.querySelectorAll('[data-product-row]');
        const tabButtons = document.querySelectorAll('[data-tab-button]');
        
        // Update tab buttons
        tabButtons.forEach(btn => {
          const tabValue = btn.getAttribute('data-tab-button');
          const textDiv = btn.querySelector('div > p');
          if (tabValue === tab) {
            btn.classList.remove('border-transparent');
            btn.classList.add('border-content-primary-brand');
            if (textDiv) {
              textDiv.classList.remove('text-content-secondary-gray');
              textDiv.classList.add('text-content-primary-black');
            }
          } else {
            btn.classList.remove('border-content-primary-brand');
            btn.classList.add('border-transparent');
            if (textDiv) {
              textDiv.classList.remove('text-content-primary-black');
              textDiv.classList.add('text-content-secondary-gray');
            }
          }
        });
        
        // Filter rows and show only first 5 for ALL tabs
        let visibleCount = 0;
        const maxVisible = 5;
        const goToAllButton = document.getElementById('go-to-all-button');
        const emptyState = document.getElementById('products-empty-state');
        
        rows.forEach(row => {
          const status = row.getAttribute('data-status');
          const matchesTab = tab === 'all' || status === tab;
          
          if (matchesTab) {
            if (visibleCount < maxVisible) {
              row.style.display = 'flex';
              visibleCount++;
            } else {
              row.style.display = 'none';
            }
          } else {
            row.style.display = 'none';
          }
        });
        
        // Count how many products match this tab (ignores maxVisible)
        const totalFiltered = Array.from(rows).filter(row => {
          const status = row.getAttribute('data-status');
          return tab === 'all' || status === tab;
        }).length;
        
        // Show/hide "Go to all products" button for ALL tabs
        if (goToAllButton) {
          if (totalFiltered > maxVisible) {
            goToAllButton.classList.remove('hidden');
            goToAllButton.classList.add('flex');
          } else {
            goToAllButton.classList.remove('flex');
            goToAllButton.classList.add('hidden');
          }
        }

        // Temporarily keep empty state hidden (logic retained for future use)
        if (emptyState) {
          emptyState.classList.remove('flex');
          emptyState.classList.add('hidden');
        }
      };
      
      // Initialize page state
      window.addEventListener('DOMContentLoaded', function() {
        // Default to in-progress tab with visible products
        filterProducts('in-progress');
        renderOpportunities();
        setProductView('list');
      });
    </script>
