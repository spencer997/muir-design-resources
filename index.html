<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Design resources</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7edf4;
      --muted: #8b9cb3;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --tag: #212c3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    header { margin-bottom: 1.75rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .toolbar input[type="search"] {
      flex: 1 1 220px;
      min-width: 0;
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
    }
    .toolbar input::placeholder { color: var(--muted); }
    .tags-label {
      font-size: 0.8rem;
      color: var(--muted);
      width: 100%;
      margin-top: 0.25rem;
    }
    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      width: 100%;
    }
    .tag-filters button {
      font-size: 0.8rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--tag);
      color: var(--muted);
      cursor: pointer;
    }
    .tag-filters button:hover { color: var(--text); border-color: var(--muted); }
    .tag-filters button.active {
      background: rgba(88, 166, 255, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .count {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    ul.list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li.card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      margin-bottom: 0.75rem;
    }
    li.card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
    }
    li.card .desc {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    li.card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .pill {
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      background: var(--bg);
      color: var(--muted);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .actions a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid transparent;
    }
    .actions a.figma {
      background: rgba(166, 77, 255, 0.15);
      color: #d4b8ff;
      border-color: rgba(166, 77, 255, 0.35);
    }
    .actions a.figma:hover { background: rgba(166, 77, 255, 0.25); }
    .actions a.proto {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent-hover);
      border-color: rgba(88, 166, 255, 0.35);
    }
    .actions a.proto:hover { background: rgba(88, 166, 255, 0.25); }
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 12px;
    }
    .err {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.35);
      color: #f85149;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Design resources</h1>
      <p class="sub">Search titles and tags. Tag filters use AND (entry must include every selected tag).</p>
    </header>

    <div class="toolbar">
      <input type="search" id="q" placeholder="Search title or tags…" autocomplete="off" />
    </div>
    <p class="tags-label">Tags (click to toggle)</p>
    <div class="tag-filters" id="tagFilters"></div>

    <p class="count" id="count"></p>
    <ul class="list" id="list"></ul>
    <div id="empty" class="empty" hidden>No matches. Clear the search or tag filters.</div>
    <div id="err" class="err" hidden></div>
  </div>

  <script>
    const OR_TAG_MODE = false;

    let allItems = [];
    let activeTags = new Set();

    const $q = document.getElementById("q");
    const $list = document.getElementById("list");
    const $count = document.getElementById("count");
    const $empty = document.getElementById("empty");
    const $err = document.getElementById("err");
    const $tagFilters = document.getElementById("tagFilters");

    function norm(s) {
      return (s || "").toLowerCase();
    }

    function itemMatches(item) {
      const q = norm($q.value.trim());
      const tags = item.tags || [];
      if (activeTags.size) {
        const ok = OR_TAG_MODE
          ? tags.some((t) => activeTags.has(t))
          : [...activeTags].every((t) => tags.includes(t));
        if (!ok) return false;
      }
      if (!q) return true;
      const hay = norm([item.title, item.description, ...tags].filter(Boolean).join(" "));
      return hay.includes(q);
    }

    function render() {
      const filtered = allItems.filter(itemMatches);
      $count.textContent = `${filtered.length} / ${allItems.length} items`;
      $list.innerHTML = "";
      $empty.hidden = filtered.length !== 0;
      filtered.forEach((item) => {
        const li = document.createElement("li");
        li.className = "card";
        const h2 = document.createElement("h2");
        h2.textContent = item.title;
        li.appendChild(h2);
        if (item.description) {
          const p = document.createElement("p");
          p.className = "desc";
          p.textContent = item.description;
          li.appendChild(p);
        }
        const meta = document.createElement("div");
        meta.className = "meta";
        (item.tags || []).forEach((t) => {
          const span = document.createElement("span");
          span.className = "pill";
          span.textContent = t;
          meta.appendChild(span);
        });
        if (item.updatedAt) {
          const span = document.createElement("span");
          span.className = "pill";
          span.textContent = "Updated " + item.updatedAt;
          meta.appendChild(span);
        }
        if (meta.childNodes.length) li.appendChild(meta);

        const actions = document.createElement("div");
        actions.className = "actions";
        if (item.figma) {
          const a = document.createElement("a");
          a.className = "figma";
          a.href = item.figma;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = "Figma";
          actions.appendChild(a);
        }
        if (item.prototype) {
          const a = document.createElement("a");
          a.className = "proto";
          a.href = item.prototype;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = "Prototype";
          actions.appendChild(a);
        }
        if (actions.childNodes.length) li.appendChild(actions);

        $list.appendChild(li);
      });
    }

    function allTags() {
      const set = new Set();
      allItems.forEach((i) => (i.tags || []).forEach((t) => set.add(t)));
      return [...set].sort((a, b) => a.localeCompare(b, "en"));
    }

    function renderTagButtons() {
      $tagFilters.innerHTML = "";
      allTags().forEach((tag) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = tag;
        if (activeTags.has(tag)) btn.classList.add("active");
        btn.addEventListener("click", () => {
          if (activeTags.has(tag)) activeTags.delete(tag);
          else activeTags.add(tag);
          renderTagButtons();
          render();
        });
        $tagFilters.appendChild(btn);
      });
    }

    $q.addEventListener("input", () => render());

    fetch("data/links.json")
      .then((r) => {
        if (!r.ok) throw new Error("Failed to load data/links.json (" + r.status + ")");
        return r.json();
      })
      .then((data) => {
        allItems = Array.isArray(data) ? data : [];
        renderTagButtons();
        render();
      })
      .catch((e) => {
        $err.hidden = false;
        $err.textContent = e.message || String(e);
        $count.textContent = "";
      });
  </script>
</body>
</html>
